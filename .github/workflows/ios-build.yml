name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build TraceLog for iOS
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app
        run: |
          set -o pipefail
          xcodebuild build \
            -project TraceLog.xcodeproj \
            -scheme TraceLog \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log || true
          echo "=== FULL BUILD LOG ==="
          cat build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

  build-simulator:
    name: Build for Simulator (test)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: List available simulators
        run: xcrun simctl list devices available || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project TraceLog.xcodeproj \
            -scheme TraceLog \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build-sim.log || true
          echo "=== FULL BUILD LOG ==="
          cat build-sim.log
